<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mis Tarjetas - Portal Bancario</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#10b981", "background-light": "#f8f6f6", "background-dark": "#0b120f" },
                    fontFamily: { "display": ["Public Sans"] }
                }
            }
        }
    </script>
</head>
<body class="bg-background-light text-slate-900 font-display min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 flex-shrink-0 border-r border-slate-200 bg-white flex flex-col justify-between p-4">
            <div class="flex flex-col gap-6">
                <div class="flex items-center gap-3 px-2">
                    <div class="bg-primary size-10 rounded-xl flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-2xl">credit_card</span>
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-slate-900 text-lg font-bold leading-none">Tarjetas</h1>
                        <p class="text-slate-500 text-xs">Portal Bancario</p>
                    </div>
                </div>
                <nav class="flex flex-col gap-1">
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100" href="/accounts.html">
                        <span class="material-symbols-outlined">dashboard</span>
                        <span class="text-sm font-medium">Dashboard</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary/10 text-primary border-r-4 border-primary" href="/cards.html">
                        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">credit_card</span>
                        <span class="text-sm font-bold">Tarjetas</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100" href="/transfers.html">
                        <span class="material-symbols-outlined">swap_horiz</span>
                        <span class="text-sm font-medium">Transferencias</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100" href="/payments.html">
                        <span class="material-symbols-outlined">payments</span>
                        <span class="text-sm font-medium">Pagos</span>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100" href="/investments.html">
                        <span class="material-symbols-outlined">trending_up</span>
                        <span class="text-sm font-medium">Inversiones</span>
                    </a>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-200">
                <div class="flex items-center gap-3 px-2">
                    <div id="user-initials" class="size-8 rounded-full bg-slate-200 flex items-center justify-center font-bold text-xs">JD</div>
                    <div class="flex flex-col overflow-hidden">
                        <p id="user-name" class="text-sm font-semibold truncate">Cargando...</p>
                        <p id="logout-btn" class="text-xs text-primary cursor-pointer hover:underline">Cerrar Sesión</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-background-light">
            <header class="flex items-center justify-between px-8 py-4 bg-white/50 backdrop-blur-md border-b border-slate-200 sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">credit_card</span>
                    <h2 class="text-xl font-bold tracking-tight">Gestión de Tarjetas</h2>
                </div>
            </header>
            <div class="p-8 max-w-6xl mx-auto w-full flex flex-col gap-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Tus Productos de Crédito</h1>
                    <p class="text-slate-500 mt-1">Administra tus límites y realiza pagos de forma interactiva.</p>
                </div>
                <div id="cards-container" class="grid md:grid-cols-2 gap-8">
                    <!-- Dinámico -->
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="./src/cards_handler.js"></script>
</body>
</html>
